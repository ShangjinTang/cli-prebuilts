name: Scheduled Workflow
on:
  schedule:
    - cron: "0 0 * * *" # execute at 00:00 everyday
  workflow_dispatch:

jobs:
  run_script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Run script based on 'gh' and commit download releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "shangjin.tang@github.com"
          git config --local user.name "GitHub Action"
          ./scripts/gh_release_download --all --install --verbose
          ls ~/.gh_releases/bin
          mv -f ~/.gh_releases/bin/* .
          git status
          git add .
          git status
          git commit -m "Update releases [skip ci]"
          gh repo push origin HEAD:main
